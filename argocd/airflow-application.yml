apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  namespace: argocd
spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: airflow

  sources:
    # the official airflow  chart 
    - repoURL: https://airflow.apache.org
      chart: airflow
      targetRevision: 1.22.0
      helm:
        valueFiles:
          - $values/helm/airflow/values.yml
 
     # the repo which contain my values.yml 
    - repoURL: https://github.com/hishamkamel21/Hr-Platform-Infra.git
      targetRevision: main
      ref: values

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true 

  
