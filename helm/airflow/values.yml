executor: KubernetesExecutor

airflowVersion: "3.0.2"

images:
  airflow:
    repository: hisham21113/hr-platform
    tag: "e42fa2e78057885a1602a69a4d2e478f49a07b5c"

webserver:
  replicas: 1

scheduler:
  replicas: 1

triggerer:
  replicas: 0

workers:
  replicas: 0

postgresql:
  enabled: true

  image:
    registry: docker.io
    repository: hisham21113/hr-platform
    tag: "e42fa2e78057885a1602a69a4d2e478f49a07b5c"

redis:
  enabled: false

createUserJob:
  useHelmHooks: false

migrateDatabaseJob:
  useHelmHooks: false

serviceAccount:
  create: true

logs:
  persistence:
    enabled: false

# git sync to pull the dags from remote repo 
dags:
  persistence:
    enabled: false

  gitSync:
    enabled: true
    repo: https://github.com/hishamkamel21/Hr-Platform.git
    branch: main
    rev: HEAD
    # 1. Minimizes download size by only fetching the latest commit
    depth: 1
    # 2. Tells Airflow to only look inside the "dags" folder of your repo
    subPath: "dags"
    period: 30s



env:
  - name: AIRFLOW__CORE__LOAD_EXAMPLES
    value: "False"

  - name: AIRFLOW__WEBSERVER__EXPOSE_CONFIG
    value: "False"

  - name: TZ
    value: "Africa/Cairo"

envFromSecrets:
  - airflow-env 

  