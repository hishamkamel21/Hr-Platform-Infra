executor: KubernetesExecutor

airflowVersion: "3.0.2"

images:
  airflow:
    repository: hisham21113/hr-platform
    tag: v1

webserver:
  replicas: 1

scheduler:
  replicas: 1

triggerer:
  replicas: 0

workers:
  replicas: 0

postgresql:
  enabled: true

redis:
  enabled: false

createUserJob:
  useHelmHooks: false

migrateDatabaseJob:
  useHelmHooks: false

serviceAccount:
  create: true

logs:
  persistence:
    enabled: false

# git sync to pull the dags from remote repo 
dags:
  persistence:
    enabled: false

  gitSync:
    enabled: true
    repo: https://github.com/USERNAME/REPO.git
    branch: main
    rev: HEAD
    depth: 1
    subPath: dags
    period: 30s


env:
  - name: AIRFLOW__CORE__LOAD_EXAMPLES
    value: "False"

  - name: AIRFLOW__WEBSERVER__EXPOSE_CONFIG
    value: "False"

  - name: TZ
    value: "Africa/Cairo"

envFromSecrets:
  - airflow-env 

  